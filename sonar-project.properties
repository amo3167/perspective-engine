sonar.organization=amo3167
sonar.projectKey=amo3167_perspective-engine
sonar.projectName=Perspective Engine

# New Code = "Previous version" (set this in the SonarCloud UI under
# Administration -> New Code). Bump this per release to advance the new-code
# window; existing code then stays out of the new-code Quality Gate so the gate
# enforces quality on new contributions rather than the whole existing codebase.
# 0.1.0 was the initial baseline analysis; 0.1.1 advances the window so the
# pre-existing codebase is grandfathered and only new work is gated.
sonar.projectVersion=0.1.1

sonar.sources=engine,server,patterns,web/src
sonar.tests=tests
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

# Built assets, dependencies, example scripts, and the demo/pattern packs are
# not analyzed. patterns/**/scripts/** are non-shipped demo & simulation scripts
# (feedback simulators, archetype/data generators, pattern orchestrators) — they
# use random for simulation, spawn helper subprocesses, and build paths from
# their own CLI args, none of which is a security concern in that context. They
# are already excluded from coverage below; excluding them from analysis keeps
# the security/reliability ratings focused on the shipped engine + server.
sonar.exclusions=web/dist/**,**/node_modules/**,examples/**,patterns/**/scripts/**

# Test code, demo/pattern scripts, the web UI, and thin IO adapters (HTTP,
# subprocess management, external search) need integration tests, not unit
# coverage, so they don't count toward the coverage metric.
sonar.coverage.exclusions=tests/**,patterns/**,server/**,web/**,examples/**,engine/http_client.py,engine/agent_processes.py,engine/agent_tools.py

# Wait for the Quality Gate result and fail the CI job when the gate fails.
sonar.qualitygate.wait=true
