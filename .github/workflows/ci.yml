name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Runs all hooks from .pre-commit-config.yaml (ruff check + ruff-format +
      # hygiene) across the repo — the same checks contributors get locally.
      - uses: pre-commit/action@v3.0.1

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyright

      - name: Type check
        run: pyright engine/ --pythonversion 3.11
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage

      - name: Run tests with coverage
        run: |
          python -m coverage run -m pytest tests/ -q
          python -m coverage xml -o coverage.xml
          python -m coverage report

  validate-packs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate meeting pack JSON (syntax)
        run: |
          python -c "
          import json, pathlib, sys
          errors = 0
          for pack_dir in pathlib.Path('packs').iterdir():
              if not pack_dir.is_dir():
                  continue
              for json_file in pack_dir.glob('*.json'):
                  try:
                      json.loads(json_file.read_text())
                      print(f'  OK: {json_file}')
                  except json.JSONDecodeError as e:
                      print(f'  FAIL: {json_file}: {e}')
                      errors += 1
          if errors:
              print(f'\n{errors} JSON file(s) failed validation')
              sys.exit(1)
          print('\nAll meeting pack JSON files are valid')
          "

      - name: Validate meeting pack cross-references
        run: |
          for pack in packs/*/; do
            python -m engine.validate_pack "$pack" --strict
          done
